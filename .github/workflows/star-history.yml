name: Star History

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: star-history
  cancel-in-progress: false

jobs:
  star-history:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Generate chart
        env:
          GH_STAR_HISTORY_TOKEN: ${{ secrets.GH_STAR_HISTORY_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python3 scripts/generate_star_chart.py

      - name: Commit if changed
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/star-history.svg assets/star-history-data.json README.md
          if git diff --cached --quiet; then
            echo "No chart changes to commit"
            exit 0
          fi
          git commit -m "chore: update star history chart [skip ci]"
          git pull --rebase origin "$BRANCH"
          git push
