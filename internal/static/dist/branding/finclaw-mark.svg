    d="M 22 36 L 46 22 L 66 28 L 86 14 L 106 20"
    stroke="url(#finclaw-teal)"
    stroke-width="5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <circle cx="46" cy="22" r="3.5" fill="#14b8a6"/>
  <circle cx="66" cy="28" r="3.5" fill="#14b8a6"/>
  <circle cx="86" cy="14" r="3.5" fill="#5eead4"/>
  <circle cx="106" cy="20" r="3.5" fill="#99f6e4"/>
  <!-- 螯形独占下半区 -->
  <path
    d="M 22 102 C 18 86 22 72 36 64 C 44 60 52 58 58 62 C 62 54 74 50 84 56 C 96 62 100 76 94 88 C 88 98 76 104 64 106 C 54 112 40 114 28 108 C 24 106 22 104 22 102 Z"
    fill="url(#finclaw-gold)"
  />
  <ellipse cx="50" cy="82" rx="11" ry="9" fill="#1c1917" opacity="0.18"/>
  <path d="M 74 58 L 98 46 L 102 52 L 78 64 Z" fill="#d4a84b"/>
  <path d="M 78 62 L 100 54 L 96 60 L 80 70 Z" fill="#a67c2a"/>
</svg>
