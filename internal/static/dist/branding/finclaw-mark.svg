<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="finclaw-gold" x1="24" y1="72" x2="98" y2="108" gradientUnits="userSpaceOnUse">
      <stop stop-color="#e8b84a"/>
      <stop offset="0.45" stop-color="#c9a84c"/>
      <stop offset="1" stop-color="#8b6914"/>
    </linearGradient>
    <linearGradient id="finclaw-teal" x1="20" y1="36" x2="108" y2="20" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
  </defs>
  <!-- 走势线固定在上半区，避免与下方螯形重叠导致小尺寸下图标发糊、像“穿模” -->
